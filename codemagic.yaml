workflows:
  ios-workflow:
    name: iOS Demo Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build iOS
        script: |
          flutter build ios --simulator --debug
      - name: Create IPA
        script: |
          cd build/ios/iphonesimulator
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r VaniBill.ipa Payload
    artifacts:
      - build/ios/iphonesimulator/VaniBill.ipa
